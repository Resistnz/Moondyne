<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moondyne | Perth, WA</title>
  <meta name="description"
    content="Official website of Moondyne, a progressive classic rock band. Tour dates, media, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Inter for body, and a nice Serif (Cinzel) for a subtle classic rock vibe for headings -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- Background subtle effect -->
  <div class="bg-fx"></div>

  <!-- Header Navigation -->
  <header id="site-header">
    <div class="header-container">
      <!-- Logo Placeholder -->
      <a href="#" class="logo-link">
        <img src="" alt="Moondyne Logo" class="logo-placeholder" id="logo" />
        <span class="sr-only">Moondyne</span>
      </a>
      <nav class="main-nav">
        <ul>
          <li><a href="#shows">Shows</a></li>
          <li><a href="#media">Media</a></li>
          <li><a href="#store">Store</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section id="hero" class="hero-section">
      <div class="hero-bg">
        <!-- Placeholder BG -->
        <img src="/hero_bg_placeholder.jpg" alt="Moondyne Live" class="hero-img" id="hero-bg-img" />
        <div class="hero-overlay"></div>
      </div>
      <div class="hero-content">
        <h1 class="band-name">MOONDYNE</h1>
        <p class="tagline">Classic. Energetic. Alive.</p>
      </div>
      <a href="#shows" class="scroll-down-indicator" aria-label="Scroll Down">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9l6 6 6-6" />
        </svg>
      </a>
    </section>

    <!-- Shows Section -->
    <section id="shows" class="shows-section fade-in-section">
      <div class="container">
        <h2 class="section-title">Upcoming Shows</h2>
        <div class="shows-list" id="shows-container">
          <!-- Shows dynamically injected by main.js -->
        </div>
      </div>
    </section>

    <!-- Media Portfolio Section -->
    <section id="media" class="media-section fade-in-section">
      <div class="container">
        <h2 class="section-title">Media</h2>
        <div class="gallery-wrapper" id="gallery-wrapper">
          <div class="portfolio-grid">
            <div class="portfolio-item wide">
              <img src="/band.jpeg" alt="Moondyne" class="portfolio-img" id="pf-1" />
            </div>
            <div class="portfolio-item tall">
              <img src="/toby.jpg" alt="Toby" class="portfolio-img" id="pf-2" />
            </div>
            <div class="portfolio-item">
              <img src="/ryan.jpg" alt="Ryan" class="portfolio-img" id="pf-3" />
            </div>
            <div class="portfolio-item">
              <img src="/ween.jpg" alt="Ewen" class="portfolio-img" id="pf-4" />
            </div>
            <div class="portfolio-item tall">
              <img src="/zeke.jpg" alt="Zeke" class="portfolio-img" id="pf-5" />
            </div>
            <div class="portfolio-item wide">
              <img src="/mic.JPG" alt="Band Live" class="portfolio-img" id="pf-6" />
            </div>
            <div class="portfolio-item">
              <img src="/zeke close.jpg" alt="Stage Setup" class="portfolio-img" id="pf-7" />
            </div>
            <div class="portfolio-item wide">
              <img src="/best photo of all time.jpg" alt="Group Shot" class="portfolio-img" id="pf-8" />
            </div>
            <div class="portfolio-item tall">
              <img src="/taya.jpg" alt="Group Shot" class="portfolio-img" id="pf-9" />
            </div>
          </div>
          <div class="see-less-container" id="see-less-container">
            <button class="see-more-btn" id="see-less-btn">
              <span>See Less</span>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"
                style="transform: rotate(180deg); animation: float-down 2s infinite;">
                <path d="M6 9l6 6 6-6" />
              </svg>
            </button>
          </div>
          <div class="gallery-overlay" id="gallery-overlay">
            <button class="see-more-btn" id="see-more-btn">
              <span>See More</span>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9l6 6 6-6" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Connect Section (Store & Contact) -->
    <section id="store" class="connect-section fade-in-section">
      <div class="container connect-container">

        <div class="connect-block">
          <h2 class="section-title" style="margin-bottom: 2rem;">Music & Merch</h2>
          <p class="store-subtitle">Coming Soon</p>
          <div class="newsletter-signup" style="margin-top: auto;">
            <p>Join the mailing list for updates.</p>
            <form class="signup-form" onsubmit="event.preventDefault(); alert('Newsletter signup coming soon!');">
              <input type="email" placeholder="Email Address" required />
              <button type="submit">Subscribe</button>
            </form>
          </div>
        </div>

        <div class="connect-block" id="contact">
          <h2 class="section-title" style="margin-bottom: 2rem;">Contact</h2>
          <p style="color: var(--text-secondary); margin-bottom: 2rem;">For booking and general inquiries, drop us a
            line.</p>
          <div style="margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center;">
            <a href="mailto:moondynetheband@gmail.com" class="contact-button">Email Us</a>
            <p style="margin-top: 1.5rem; font-family: var(--font-sans); color: var(--text-primary); font-weight: 600;">
              moondynetheband@gmail.com</p>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="social-links">
        <a href="https://www.facebook.com/Moondynetheband/" aria-label="Facebook">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
          </svg>
        </a>
        <a href="https://www.instagram.com/moondyneband/" aria-label="Instagram">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
        </a>
        <a href="#" aria-label="Spotify">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
            <path d="M8 17.5c1.5-1 3.5-1.5 5.5-1.5s4 0.5 5.5 1.5"></path>
            <path d="M7 13.5c2-1.5 4.5-2 7-2s5 0.5 7 2"></path>
            <path d="M6 9.5c2.5-2 5.5-2.5 8.5-2.5s6 0.5 8.5 2.5"></path>
          </svg>
        </a>
        <a href="#" aria-label="YouTube">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z">
            </path>
            <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
          </svg>
        </a>
      </div>
      <p class="copyright">&copy; <span id="year"></span> Moondyne. All rights reserved.</p>
    </div>
  </footer>
  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-content" id="lightbox-img" alt="Gallery View">
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
